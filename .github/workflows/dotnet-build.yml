name: .NET Build Test and Publish artifacts

on:
  push:
    branches:
      - master
    tags:
      - '*.*.*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: '**/*.csproj'
    - name: Restore dependencies
      run: dotnet restore -v n /p:EnableWindowsTargeting=true
    - name: Build
      run: dotnet build --configuration ${{ matrix.configuration }} --no-restore /p:EnableWindowsTargeting=true
    - name: Test
      run: dotnet test --configuration ${{ matrix.configuration }} --no-build --verbosity normal /p:EnableWindowsTargeting=true

  publish-avalonia:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        configuration: [Release]
        runtime: [win-x64, win-arm64, linux-x64, linux-arm64, osx-x64, osx-arm64]

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: '**/*.csproj'
    - name: Build
      working-directory: TomodachiDrawer.UI.Avalonia
      # Only use PublishSingleFile if NOT osx
      run: |
        dotnet publish --configuration ${{ matrix.configuration }} \
          -r ${{ matrix.runtime }} \
          --self-contained \
          ${{ !contains(matrix.runtime, 'osx') && '-p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true' || '-p:PublishReadyToRun=true' }} \
          ${{ github.ref_type == 'tag' && format('-p:Version={0}', github.ref_name) || '' }}
    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: TomodachiDrawer-Avalonia-${{ matrix.runtime }}-${{ matrix.configuration }}
        path: TomodachiDrawer.UI.Avalonia/bin/${{ matrix.configuration }}/net10.0/${{ matrix.runtime }}/publish/

  release:
    name: Draft release
    runs-on: ubuntu-latest
    needs: publish-avalonia
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v6
    - name: Download artifacts
      uses: actions/download-artifact@v8
      with:
        path: unzipped-artifacts
        merge-multiple: false
    - name: Zip for Release
      run: |
        mkdir final-packages
        for dir in unzipped-artifacts/*/; do
          dirname=$(basename "$dir")
          outname="${dirname//osx/mac}"
          
          cd "$dir"
          echo "Processing ${dirname} into ${outname}"
          
          if [[ "$dirname" == *"osx"* ]]; then
            echo "Mac .tar.gz (Creating .app bundle + README)"
            
            # 1. Create a staging area outside the current folder to avoid recursion
            STAGING="../${dirname}_staging"
            mkdir -p "$STAGING/TomodachiDrawer.app/Contents/MacOS"
            
            # 2. Copy publish output to staging
            cp -r ./* "$STAGING/TomodachiDrawer.app/Contents/MacOS/"
            
            # 3. Move to staging to finish the bundle
            cd "$STAGING"
            
            # 4. Rename executable and fix permissions
            mv TomodachiDrawer.app/Contents/MacOS/TomodachiDrawer.UI.Avalonia TomodachiDrawer.app/Contents/MacOS/TomodachiDrawer
            chmod -R +x TomodachiDrawer.app/Contents/MacOS/
            
            # 5. Create Info.plist
            echo '<?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>CFBundleExecutable</key>
                <string>TomodachiDrawer</string>
                <key>CFBundleIdentifier</key>
                <string>com.tomodachidrawer.app</string>
                <key>CFBundleName</key>
                <string>TomodachiDrawer</string>
                <key>CFBundlePackageType</key>
                <string>APPL</string>
                <key>LSMinimumSystemVersion</key>
                <string>10.12</string>
            </dict>
            </plist>' > TomodachiDrawer.app/Contents/Info.plist
            
            # 6. Create the Mac-specific README
            echo "IMPORTANT NOTE: If you try and run the .app immediately after downloading it, Apple will claim its damaged. This is because its unsigned, since I don't own a mac.
            
            This is a security feature, you can help remedy this by launching Terminal, typing
            
            xattr -cr
            
            dragging and dropping the .app into the terminal (which will paste the path), hitting enter
            
            and then after hitting enter, try opening the .app again." > README_MAC_USERS.txt

            # 7. Tar the bundle and readme (final-packages is two levels up from here)
            tar -czvf "../../final-packages/${outname}-${{ github.ref_name }}.tar.gz" TomodachiDrawer.app README_MAC_USERS.txt
            
            # 8. Clean up and return to the artifact loop
            cd ..
            rm -rf "${dirname}_staging"
            cd "$dirname"
            
          elif [[ "$dirname" == *"linux"* ]]; then
            echo "Linux .tar.gz"
            chmod +x TomodachiDrawer.UI.Avalonia
            tar -czvf "../../final-packages/${outname}-${{ github.ref_name }}.tar.gz" *
            
          else
            echo "Windows .zip"
            zip -r "../../final-packages/${outname}-${{ github.ref_name }}.zip" .
          fi
          
          cd ../..
        done
    - name: Create release draft
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create ${{ github.ref_name}} final-packages/* --draft --generate-notes --title "${{ github.ref_name }} - RELEASENAME_REPLACEME"